<!DOCTYPE html>
<html lang="{{lang}}">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="{{pageTitle}} - {{title}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Preconnects for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tittle added from main.js when generating the html --> 
    <title>{{title}}</title>

    <script>
      const prefix = "{{prefix}}"
    </script>

    <!-- Estilos y scripts -->
    <script src="{{prefix}}intAssets/script.js"></script>
    <link rel="stylesheet" href="{{prefix}}intAssets/style.css">
    <link rel="stylesheet" href="{{prefix}}intAssets/styleSidebar.css">

    <!-- Sidebar full-text search (separate module under intAssets/search/) -->
    {{searchScript}}

    <!-- Prefetch the search index in parallel so the first keystroke is instant. -->
    <link rel="prefetch" href="{{prefix}}intAssets/search-index.json" as="fetch" crossorigin="anonymous">

    <!-- Scripts and styles if necesary -->

    {{imageZoom}}

    {{playerCSS}}
    {{playerJS}}


    {{highlightJS}}
    {{highlightCSSTheme}}
    
    <!-- Link the script, the CSS, and the sidebar CSS, and calculate the distance to the root to get the prefix --> 
    <!-- Inline critical layout to reduce CLS by reserving space for the sidebar on desktop -->
    <style>
      @media (min-width: 1000px) {
        main { margin-left: 300px; }
        #sidebar {
          left: 0;
          top: 0;
          width: 300px;
          height: 100%;
          position: fixed;
        }
      }

      main{
        margin-bottom: 20px;
        max-width: 1000px;
        min-width: 0px;
        padding-inline: 10%;
        flex-grow: 1;
        overflow-wrap: break-word;
      }


      :root {
        text-align: left;
        font-size: 17px !important;
      }

      /* Improve image/video stability: reserve space for images and videos and lazy-load images by default */
      img.img { display: block; max-width: 100%; height: auto; }
      video { width: 100%; height: auto; display: block; }
    </style>

  </head>
    <body>
        <!-- Open sidebar button -->
        <button id="icon-btn2" title="Open sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M3 12h18M3 18h18" stroke="black" stroke-width="2"/>
          </svg>
        </button>
        <main>
            <!-- Where the page content will be inserted in compilation --> 
            {{content}}
        </main>
        <!-- Here starts the sidebar HTML --> 
        <nav id="sidebar">
          <div id="div-titulo">
            <a id="sidebar-title" href = '/'>{{sidebarTitle}}</a>
            <button id="icon-btn" title="Close sidebar">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 6h18M3 12h18M3 18h18" stroke="#e5edf4" stroke-width="2"/>
              </svg>
            </button>
          </div>
          <!-- Search box: filters the documentation at build time via intAssets/search-index.json -->
          <div id="sidebar-search">
            <input
              type="search"
              id="sidebar-search-input"
              placeholder="Search documentation..."
              aria-label="Search documentation"
              autocomplete="off"
              spellcheck="false">
            <button id="sidebar-search-clear" type="button" aria-label="Clear search" title="Clear">×</button>
            <div id="sidebar-search-results" role="listbox" aria-label="Search results"></div>
          </div>
          <div id="sidebar-menu"></div>

          <div id="versionDiv">
            <div id="sidebarBottomText">{{sidebarBottomText}}</div>
            <div id="version">{{version}}</div>
          </div>
        </nav>
        <!-- Here ends the sidebar --> 
    </body>
</html>
